apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-htpass-hcp
  namespace: open-cluster-management-policies
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SystemAndCommunicationsProtection
    policy.open-cluster-management.io/controls: SC-8 Transmission Confidentiality and Integrity
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: config-htpass-hcp
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: bitnami.com/v1alpha1
                kind: SealedSecret
                metadata:
                  creationTimestamp: null
                  name: htpass-secret
                  namespace: clusters
                spec:
                  encryptedData:
                    htpasswd: 
                  template:
                    metadata:
                      creationTimestamp: null
                      name: htpass-secret
                      namespace: clusters
                    type: Opaque
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: config-htpass-oauth
        spec:
          remediationAction: enforce
          severity: high
          object-templates-raw: |
            {{- range (lookup "hypershift.openshift.io/v1beta1" "HostedCluster" "clusters" "").items }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: hypershift.openshift.io/v1beta1
                kind: HostedCluster
                metadata:
                  name: '{{ .metadata.name }}'
                  namespace: clusters
                spec:
                  configuration:
                    oauth:
                      identityProviders:
                        - name: htpasswd-auth
                          mappingMethod: claim
                          type: HTPasswd
                          htpasswd:
                            fileData:
                              name: htpass-secret
            {{- end }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: policy-htpass-hcp-placement
  namespace: open-cluster-management-policies
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            local-cluster: "true"
  clusterSets:
    - default
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: policy-htpass-hcp-placement
  namespace: open-cluster-management-policies
placementRef:
  name: policy-htpass-hcp-placement
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: policy-htpass-hcp
    kind: Policy
    apiGroup: policy.open-cluster-management.io
