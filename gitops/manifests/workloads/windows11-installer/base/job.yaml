apiVersion: batch/v1
kind: Job
metadata:
  name: windows11-installer-trigger
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: pipeline
      initContainers:
        - name: get-iso-url
          image: selenium/standalone-chrome:latest
          command: ["python3", "/scripts/getisourl.py"]
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: script
              mountPath: /scripts
      containers:
        - name: create-pipelinerun
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command:
            - /bin/bash
            - -c
            - |
              ISO_URL=$(cat /shared/iso-url.txt)
              if [ -z "$ISO_URL" ]; then
                echo "ERROR: ISO URL is empty"
                exit 1
              fi
              echo "ISO URL: $ISO_URL"
              cat <<EOF | oc create -f -
              apiVersion: tekton.dev/v1
              kind: PipelineRun
              metadata:
                generateName: windows11-installer-run-
                namespace: vm-golden-images
              spec:
                pipelineRef:
                  name: windows-efi-installer
                params:
                  - name: winImageDownloadURL
                    value: "${ISO_URL}"
                  - name: acceptEula
                    value: "true"
                  - name: instanceTypeName
                    value: u1.2xlarge
                taskRunSpecs:
                  - pipelineTaskName: modify-windows-iso-file
                    podTemplate:
                      securityContext:
                        fsGroup: 107
                        runAsUser: 107
                taskRunTemplate:
                  serviceAccountName: pipeline
                timeouts:
                  pipeline: 3h0m0s
              EOF
          volumeMounts:
            - name: shared
              mountPath: /shared
      volumes:
        - name: shared
          emptyDir: {}
        - name: script
          configMap:
            name: getisourl-script
            defaultMode: 0755
      restartPolicy: Never
