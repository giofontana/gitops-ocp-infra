apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: frigate-cert
  namespace: frigate
spec:
  secretName: frigate-certs
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "frigate.gfontana.me"
  dnsNames:
  - "frigate.gfontana.me"
  usages:
  - digital signature
  - key encipherment
  - server auth
  renewBefore: 720h  # Renew 30 days before expiry
  secretTemplate:
    labels:
      app: frigate
