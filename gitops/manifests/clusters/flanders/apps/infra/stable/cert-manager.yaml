apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd-flanders
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    namespace: argocd-flanders
    server: https://api.flanders.lab.gfontana.me:6443
  project: default
  source:
    path: gitops/manifests/clusters/flanders/aggregate/infra/cert-manager/
    repoURL: https://github.com/giofontana/gitops-ocp-infra.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
