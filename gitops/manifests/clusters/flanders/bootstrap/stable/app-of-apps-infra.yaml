apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps-infra-flanders
  namespace: argocd-flanders
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/compare-options: IgnoreExtraneous
  labels:
    gitops.ownedBy: default
spec:
  destination:
    namespace: argocd-flanders
    server: https://kubernetes.default.svc
  project: default
  source:
    path: gitops/manifests/clusters/flanders/apps/infra/stable
    repoURL: https://github.com/giofontana/gitops-ocp-infra.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
