---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

resources:
  - ../../../../all/aggregate/auth
  - ../../../configuration/auth

patches:
  - path: patch-oauth-github.yaml
    target:
      group: config.openshift.io
      version: v1
      kind: OAuth
      name: cluster
