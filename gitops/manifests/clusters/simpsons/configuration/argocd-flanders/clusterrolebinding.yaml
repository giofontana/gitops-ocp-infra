kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: argocd-flanders-cluster-admin
subjects:
  - kind: ServiceAccount
    name: argocd-flanders-argocd-application-controller
    namespace: argocd-flanders
  - kind: ServiceAccount
    name: argocd-flanders-applicationset-controller
    namespace: argocd-flanders
  - kind: ServiceAccount
    name: argocd-flanders-argocd-server
    namespace: argocd-flanders
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
