apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd-flanders

resources:
  - namespace.yaml
  - argocd.yaml
  - clusterrolebinding.yaml
  - cluster-secret-sealed.yaml
  - patch-subscription-job.yaml
  - consolelink.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: patch-subscription-job
    namespace: argocd-flanders
    files:
      - patch-subscription-job.sh
