---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patch-subscription-job
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: patch-openshift-gitops-subscription
rules:
  - apiGroups:
      - operators.coreos.com
    resources:
      - subscriptions
    verbs:
      - get
      - patch
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: patch-openshift-gitops-subscription
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: patch-openshift-gitops-subscription
subjects:
  - kind: ServiceAccount
    name: patch-subscription-job
    namespace: openshift-gitops
---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-openshift-gitops-subscription
  namespace: openshift-gitops
spec:
  template:
    spec:
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli
          command:
            - /bin/bash
            - -c
            - /scripts/patch-subscription-job.sh
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: patch-subscription-job
            defaultMode: 0755
      restartPolicy: Never
      serviceAccount: patch-subscription-job
      serviceAccountName: patch-subscription-job
  backoffLimit: 4
